# default configuration, can be edited

# The URL of the login page to which unauthenticated users are redirected when
# they try to access a protected resource (HTTP 401).
# - Leave empty (default) to disable the embedded login URL provider. In that
#   case, Jahia's default login handling applies.
# - When set, the URL must be a valid Jahia page path that:
#     * is accessible without authentication
#     * includes the site key (required for proper email template resolution)
# Example of URL: /sites/mySite/login.html
loginUrl=

# The list of MFA (Multi-Factor Authentication) factor types that are active.
# Custom factors can be added by implementing the MfaFactorProvider interface.
enabledFactors.0=email_code

# The maximum number of consecutive failed MFA verification attempts allowed
# for a given factor before the user is temporarily suspended.
# Once this threshold is reached, the user is suspended for the duration
# defined by mfaUserTemporarySuspensionSeconds.
maxAuthFailuresBeforeLock=5

# The sliding time window (in seconds) during which failed MFA verification
# attempts are counted toward the maxAuthFailuresBeforeLock threshold.
# Failures older than this window are discarded and no longer contribute to
# the lock count. This prevents users from being locked out by old failures.
mfaAuthFailuresWindowSeconds=120

# The duration (in seconds) for which a user is suspended after exceeding the
# maxAuthFailuresBeforeLock threshold.
# During suspension, any new MFA verification attempt is rejected immediately
# The suspension is lifted automatically once this duration has elapsed.
mfaUserTemporarySuspensionSeconds=600

# The minimum time (in seconds) that must elapse between two consecutive MFA
# factor preparation requests (i.e. "send me a new code") for the same user
# and the same factor type.
# This prevents abuse such as flooding the mail server with code-send requests.
# A new code cannot be requested until this cooldown period has passed since
# the last preparation.
mfaFactorStartRateLimitSeconds=30
